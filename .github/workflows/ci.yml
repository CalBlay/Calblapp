# Qualitat: lint + TypeScript (el build de Next pot seguir amb ignoreBuildErrors localment).
name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # v5+ executa l'acció amb Node 24 (evita l'avís de Node 20 obsolet de checkout@v4).
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck
